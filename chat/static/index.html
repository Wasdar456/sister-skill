<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Loading...</title>
<style>
  /* ── Reset & 基础 ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }

  /* ── 布局 ────────────────────────────────────────── */
  body {
    display: flex;
    background: #ededed;
  }

  /* 侧边栏 */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: #2e2e2e;
    display: flex;
    flex-direction: column;
    color: #ccc;
    user-select: none;
  }
  #sidebar-header {
    padding: 18px 16px 12px;
    font-size: 13px;
    color: #888;
    letter-spacing: .5px;
    border-bottom: 1px solid #3a3a3a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #sidebar-header span { font-size: 11px; color: #666; }
  #new-chat-btn {
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background .2s;
  }
  #new-chat-btn:hover { background: #06ad56; }

  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .session-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .15s;
  }
  .session-item:hover { background: #3a3a3a; }
  .session-item.active { background: #3a3a3a; border-left-color: #07c160; }
  .session-item .s-title { font-size: 13px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-item .s-meta { font-size: 11px; color: #666; margin-top: 3px; }

  /* 主聊天区 */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* 顶栏 */
  #topbar {
    background: #f5f5f5;
    border-bottom: 1px solid #ddd;
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #topbar .name {
    font-size: 15px;
    font-weight: 500;
    color: #111;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #topbar .name .avatar-sm {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff;
  }
  #topbar .actions button {
    background: none; border: none; color: #888;
    font-size: 12px; cursor: pointer; padding: 4px 8px;
    border-radius: 4px;
  }
  #topbar .actions button:hover { background: #e8e8e8; color: #333; }

  /* 消息区 */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 10px;
    background: #ededed;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* 单条消息 */
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    max-width: 72%;
  }
  .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.her { align-self: flex-start; }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
  }
  .avatar.her-av { background: linear-gradient(135deg, #ff6b9d, #c44569); }
  .avatar.me-av  { background: linear-gradient(135deg, #07c160, #059a4e); }

  .bubble-wrap { display: flex; flex-direction: column; gap: 2px; }
  .msg-row.me .bubble-wrap { align-items: flex-end; }
  .msg-row.her .bubble-wrap { align-items: flex-start; }

  .sender-name {
    font-size: 11px;
    color: #999;
    padding: 0 4px;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 14.5px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
    max-width: 100%;
  }
  /* 气泡小尖角 */
  .bubble::before {
    content: '';
    position: absolute;
    top: 12px;
    width: 0; height: 0;
    border-style: solid;
  }
  .msg-row.her .bubble {
    background: #fff;
    color: #111;
    border-radius: 0 8px 8px 8px;
  }
  .msg-row.her .bubble::before {
    left: -7px;
    border-width: 6px 8px 6px 0;
    border-color: transparent #fff transparent transparent;
  }
  .msg-row.me .bubble {
    background: #9eea6a;
    color: #111;
    border-radius: 8px 0 8px 8px;
  }
  .msg-row.me .bubble::before {
    right: -7px;
    border-width: 6px 0 6px 8px;
    border-color: transparent transparent transparent #9eea6a;
  }

  .msg-time {
    font-size: 11px;
    color: #bbb;
    padding: 0 4px;
    margin-top: 2px;
  }

  /* 时间分割线 */
  .time-divider {
    text-align: center;
    font-size: 11px;
    color: #aaa;
    background: #d8d8d8;
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    align-self: center;
  }

  /* 正在输入 */
  .typing-bubble {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    background: #fff;
    border-radius: 0 8px 8px 8px;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #bbb;
    animation: blink 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink {
    0%,80%,100% { opacity: .3; transform: scale(1); }
    40%         { opacity: 1;  transform: scale(1.2); }
  }

  /* 输入区 */
  #input-area {
    background: #f5f5f5;
    border-top: 1px solid #ddd;
    padding: 12px 16px 14px;
    flex-shrink: 0;
  }
  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }
  #input-box {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    background: #fff;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.5;
    max-height: 120px;
    min-height: 42px;
    font-family: inherit;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  #send-btn {
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s, transform .1s;
    align-self: flex-end;
  }
  #send-btn:hover { background: #06ad56; }
  #send-btn:active { transform: scale(.96); }
  #send-btn:disabled { background: #b2dfca; cursor: not-allowed; }

  /* 空状态 */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 14px;
    gap: 12px;
    user-select: none;
  }
  #empty-state .big-emoji { font-size: 48px; }

  /* 滚动条美化 */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>

<!-- 侧边栏 -->
<div id="sidebar">
  <div id="sidebar-header">
    <span>聊天记录</span>
    <button id="new-chat-btn" onclick="newChat()">+ 新对话</button>
  </div>
  <div id="session-list"></div>
</div>

<!-- 主区域 -->
<div id="main">
  <div id="topbar">
    <div class="name">
      <div class="avatar-sm" id="sister-avatar-sm">?</div>
      <span id="sister-name-topbar">Loading...</span>
    </div>
    <div class="actions">
      <button onclick="clearChat()">清空记忆</button>
    </div>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="big-emoji">💬</div>
      <div>新对话还没开始</div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea
        id="input-box"
        placeholder="说点什么…（Enter 发送，Shift+Enter 换行）"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<script>
// ── 状态 ──────────────────────────────────────────
let currentSession = null;
let isWaiting = false;
let lastTimestamp = null;  // 用于时间分割线去重
window.sisterInfo = null;   // 人物信息（从后端获取）

// ── 初始化 ────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadSisterInfo();
  await loadSessionList();
  await newChat();
});

// 从后端获取人物信息
async function loadSisterInfo() {
  try {
    const res = await fetch('/api/sister/info');
    window.sisterInfo = await res.json();
  } catch (e) {
    window.sisterInfo = { name: '???', my_name: '我' };
  }
  // 更新顶栏
  const name = window.sisterInfo.name || '???';
  document.getElementById('page-title').textContent = name;
  document.getElementById('sister-name-topbar').textContent = name;
  document.getElementById('sister-avatar-sm').textContent = name.charAt(0);
}

// ── 会话管理 ──────────────────────────────────────
async function newChat() {
  const res = await fetch('/api/session/new', { method: 'POST' });
  const { session_id } = await res.json();
  currentSession = session_id;
  lastTimestamp = null;
  clearMessages();
  await loadSessionList();
  highlightSession(currentSession);
  document.getElementById('input-box').focus();
}

async function loadSessionList() {
  const res = await fetch('/api/session/list');
  const sessions = await res.json();
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.session_id === currentSession ? ' active' : '');
    div.dataset.sid = s.session_id;
    div.innerHTML = `
      <div class="s-title">${escHtml(s.title)}</div>
      <div class="s-meta">${s.message_count} 条  ${s.last_time.slice(0,16)}</div>
    `;
    div.onclick = () => openSession(s.session_id);
    list.appendChild(div);
  });
}

async function openSession(sid) {
  const res = await fetch(`/api/session/${sid}/load`);
  const { history } = await res.json();
  currentSession = sid;
  lastTimestamp = null;
  clearMessages();
  history.forEach(m => {
    if (m.role === 'user') appendBubble('me', m.content, m.time);
    else if (m.role === 'assistant') appendBubble('her', m.content, m.time);
  });
  highlightSession(sid);
  scrollToBottom();
}

function highlightSession(sid) {
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.dataset.sid === sid);
  });
}

async function clearChat() {
  if (!currentSession) return;
  if (!confirm('清空当前对话？（记录文件也会删除）')) return;
  await fetch(`/api/session/${currentSession}/clear`, { method: 'POST' });
  clearMessages();
  await loadSessionList();
}

// ── 发消息 ────────────────────────────────────────
async function sendMessage() {
  if (isWaiting) return;
  const box = document.getElementById('input-box');
  const text = box.value.trim();
  if (!text) return;

  box.value = '';
  autoResize(box);
  isWaiting = true;
  document.getElementById('send-btn').disabled = true;
  removeEmptyState();

  const now = fmtNow();
  appendBubble('me', text, now);
  scrollToBottom();

  // 显示"正在输入"
  const typingId = 'typing-' + Date.now();
  appendTyping(typingId);
  scrollToBottom();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: currentSession, message: text }),
    });
    const data = await res.json();
    removeTyping(typingId);

    if (data.error) {
      appendBubble('her', '⚠️ ' + data.error, fmtNow());
    } else {
      appendBubble('her', data.reply, data.time);
    }
  } catch (e) {
    removeTyping(typingId);
    appendBubble('her', '⚠️ 网络错误：' + e.message, fmtNow());
  }

  isWaiting = false;
  document.getElementById('send-btn').disabled = false;
  scrollToBottom();
  await loadSessionList();
  box.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── DOM 渲染 ──────────────────────────────────────
function removeEmptyState() {
  const el = document.getElementById('empty-state');
  if (el) el.remove();
}

function clearMessages() {
  const el = document.getElementById('messages');
  el.innerHTML = '<div id="empty-state"><div class="big-emoji">💬</div><div>新对话还没开始</div></div>';
  lastTimestamp = null;
}

function appendTimeDivider(timeStr) {
  // 只在时间差 > 5 分钟时显示
  if (lastTimestamp) {
    const diff = (new Date(timeStr) - new Date(lastTimestamp)) / 1000 / 60;
    if (diff < 5) return;
  }
  lastTimestamp = timeStr;
  const div = document.createElement('div');
  div.className = 'time-divider';
  div.textContent = formatTime(timeStr);
  document.getElementById('messages').appendChild(div);
}

function appendBubble(who, text, timeStr) {
  removeEmptyState();
  if (timeStr) appendTimeDivider(timeStr);

  const row = document.createElement('div');
  row.className = `msg-row ${who === 'me' ? 'me' : 'her'}`;

  // 名字从后端获取
  const myName = window.sisterInfo?.my_name || '我';
  const sisterName = window.sisterInfo?.name || '???';
  const myInitial = myName.charAt(0);
  const sisterInitial = sisterName.charAt(0);
  
  const avatarText = who === 'me' ? myInitial : sisterInitial;
  const avatarClass = who === 'me' ? 'me-av' : 'her-av';
  const senderName = who === 'me' ? myName : sisterName;

  row.innerHTML = `
    <div class="avatar ${avatarClass}">${avatarText}</div>
    <div class="bubble-wrap">
      <div class="sender-name">${senderName}</div>
      <div class="bubble">${escHtml(text)}</div>
      <div class="msg-time">${timeStr ? timeStr.slice(11,16) : ''}</div>
    </div>
  `;
  document.getElementById('messages').appendChild(row);
}

function appendTyping(id) {
  removeEmptyState();
  const sisterName = window.sisterInfo?.name || '???';
  const sisterInitial = sisterName.charAt(0);
  const row = document.createElement('div');
  row.className = 'msg-row her';
  row.id = id;
  row.innerHTML = `
    <div class="avatar her-av">${sisterInitial}</div>
    <div class="bubble-wrap">
      <div class="sender-name">${sisterName}</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  document.getElementById('messages').appendChild(row);
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ── 工具函数 ──────────────────────────────────────
function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtNow() {
  return new Date().toISOString().slice(0,19).replace('T',' ');
}

function formatTime(ts) {
  // ts: "2026-04-19 20:30:00"
  const d = new Date(ts);
  const now = new Date();
  const today = now.toDateString();
  const yesterday = new Date(now - 86400000).toDateString();
  const hm = ts.slice(11,16);
  if (d.toDateString() === today) return hm;
  if (d.toDateString() === yesterday) return `昨天 ${hm}`;
  return `${ts.slice(5,10)} ${hm}`;
}
</script>
</body>
</html>
